<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/javascript.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Me</title>
</head>

<body>
  <div class="container grid">
    <header>
      <h1 class="main-heading">meme me!</h1>
    </header>

    <main>
      <article>
        <canvas id="meme" width="640" height="480" aria-label="Meme image">
          Your browser does not support canvas.
        </canvas>
      </article>
    </main>

    <nav>
      <div id="actions" class="btn-container">
        <div class="action" id="take-selfie">
          <div class="modal-content">
            <canvas id="preview" width="320" height="240"></canvas>
            <button id="save-photo">Save photo</button>
          </div>
        </div>

        <div class="action" id="add-text">
          <div class="modal-content">
            <input type="text" id="text-top" maxlength="35" placeholder="Top text" />

            <input type="text" id="text-bottom" maxlength="35" placeholder="Bottom text" />

            <button id="text-save">Save text</button>
          </div>
        </div>

        <div class="action" id="settings">
          <div class="modal-content">
            <label id="dark-mode">
              <input type="checkbox" id="toggle" name="toggle" role="switch" checked />
              Dark mode
            </label>
          </div>
        </div>
    </nav>

    <footer>
      <button id="download-meme" class="secondary">Download Meme</button>

      <p>
        Built with
        <img width="20" height="20" src="/javascript.svg" alt="JS" /> +
        <img width="20" height="20" src="/vite.svg" alt="Vite" /> &
        💚 inspired from <a href="https://frontendmasters.com/" target="_blank">
          FrontendMasters</a>
      </p>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
